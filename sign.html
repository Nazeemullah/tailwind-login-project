    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

  <div class="bg-white p-8 rounded-xl shadow-lg w-80">
    
    <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

    <input 
      type="text" 
      placeholder="Username"
      class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
    >
    <input 
      type="email" 
      placeholder="Email"
      class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
    >
    <input 
      type="password" 
      placeholder="Password"
      class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
    >
    <input 
      type="password" 
      placeholder="Confirm Password"
      class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
    <button class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-700 transition">
      Sign Up
    </button>
    <p class="text-center text-sm text-gray-600 mt-4">
      Already have an account?
      <a href="tailwi.html" class="text-blue-500 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>

</body>
</html>
</body>
</html>
